name: Build and Deploy

on:
  push:
    branches:
      - develop
      - production

env:
  IMAGE_NAME: department-service
  IMAGE_TAG: ${{ github.sha }}

jobs:

  build:
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Maven
        run: mvn clean package -DskipTests

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t "${env:IMAGE_NAME}:${env:IMAGE_TAG}" .

  deploy-develop:
    runs-on: [self-hosted]
    needs: build
    if: ${{ github.ref == 'refs/heads/develop' }}
    environment: develop

    env:
      IMAGE_NAME: department-service
      IMAGE_TAG: ${{ github.sha }}
      APP_PORT: ${{ secrets.APP_PORT }}
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Stop old containers
        shell: powershell
        run: |
          docker compose down
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No containers to stop"
          }

      - name: Run Docker Compose
        shell: powershell
        run: |
          docker compose up -d

  deploy-production:
    runs-on: [self-hosted]
    needs: build
    if: ${{ github.ref == 'refs/heads/production' }}
    environment: production

    env:
      IMAGE_NAME: department-service
      IMAGE_TAG: ${{ github.sha }}
      APP_PORT: ${{ secrets.APP_PORT }}
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Load image into Minikube
        shell: powershell
        run: |
          minikube image load "${env:IMAGE_NAME}:${env:IMAGE_TAG}"

      - name: Create or update Kubernetes secret
        shell: powershell
        run: |
          kubectl create secret generic department-service-secret `
            --from-literal=APP_PORT="$env:APP_PORT" `
            --from-literal=DB_URL="$env:DB_URL" `
            --from-literal=DB_USERNAME="$env:DB_USERNAME" `
            --from-literal=DB_PASSWORD="$env:DB_PASSWORD" `
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render Kubernetes manifests
        shell: powershell
        run: |
          (Get-Content k8s/deployment.yaml) `
            -replace '\${IMAGE_NAME}', "$env:IMAGE_NAME" `
            -replace '\${IMAGE_TAG}', "$env:IMAGE_TAG" `
            | Set-Content k8s/deployment-rendered.yaml

      - name: Deploy to Minikube
        shell: powershell
        run: |
          kubectl apply -f k8s/deployment-rendered.yaml
          kubectl apply -f k8s/service.yaml

      - name: Restart deployment
        shell: powershell
        run: |
          kubectl rollout restart deployment/department-service
          kubectl rollout status deployment/department-service