name: Build and Deploy

on:
  push:
    branches:
      - develop
      - production

env:
  IMAGE_NAME: department-service
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Maven
        run: mvn clean package -DskipTests

      - name: Build Docker image
        shell: bash
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

  deploy-develop:
    runs-on: [self-hosted]
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: develop

    env:
      APP_PORT: ${{ secrets.APP_PORT }}
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Stop and Remove Existing Containers
        run: docker compose down || true

      - name: Run with Docker Compose
        run: docker compose up -d

  deploy-production:
    runs-on: [self-hosted]
    needs: build
    if: github.ref == 'refs/heads/production'
    environment: production

    env:
      APP_PORT: ${{ secrets.APP_PORT }}
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Load image into Minikube
        run: minikube image load $IMAGE_NAME:$IMAGE_TAG

      - name: Create or update Kubernetes secret
        run: |
          kubectl create secret generic department-service-secret \
            --from-literal=APP_PORT="$APP_PORT" \
            --from-literal=DB_URL="$DB_URL" \
            --from-literal=DB_USERNAME="$DB_USERNAME" \
            --from-literal=DB_PASSWORD="$DB_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render Kubernetes manifests
        run: |
          envsubst < k8s/deployment.yaml > k8s/deployment-rendered.yaml
          envsubst < k8s/service.yaml > k8s/service-rendered.yaml

      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/deployment-rendered.yaml
          kubectl apply -f k8s/service-rendered.yaml

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/department-service
          kubectl rollout status deployment/department-service